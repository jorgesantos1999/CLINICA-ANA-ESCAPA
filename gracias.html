<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje enviado | Clínica Dra. Ana Escapa</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .thanks {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .thanks-card { max-width: 480px; }
  .thanks-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--verde-suave);
    color: var(--verde-primario);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
</style>
</head>
<body>
  <div class="thanks">
    <div class="thanks-card">
      <div class="thanks-icon">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5 9.5 18 20 6"/></svg>
      </div>
      <h1>¡Gracias por escribirnos!</h1>
      <p>Hemos recibido tu mensaje correctamente. Te responderemos a la mayor brevedad para valorar tu caso y darte cita.</p>
      <a href="/" class="btn btn-primary btn-lg">Volver a la web</a>
    </div>
  </div>
</body>
</html>
